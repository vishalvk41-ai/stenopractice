<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steno Practice: Vkv4</title>
    <link rel="icon" type="image/jpeg" href="webpageIcon.jpeg?v=3">
    <link rel="stylesheet" href="style.css">
    <!-- Load Chart.js for the graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="auth-section">
        <span id="user-info">Not logged in</span>
        <button id="login-btn">Login with Google</button>
        <button id="logout-btn" class="secondary-btn" style="display: none;">Logout</button>
    </div>

    <div class="card">
        <h1>Dictation</h1>
        
        <div class="timer-controls">
            <label for="time-input">Timer (minutes):</label>
            <input type="number" id="time-input" value="1" min="0.1" step="0.1">
            <span id="timer-display">01:00</span>
        </div>

        <div class="layout-split">
            <div class="editor-section">
                <div class="mode-section">
                    <label for="audio-file-input" class="file-label">Or, practice from an audio file:</label>
                    <input type="file" id="audio-file-input" accept="audio/*">
                    <audio id="audio-player" controls></audio>
                </div>

                <div class="input-group">
                    <textarea id="text1" placeholder="Paste the first long sentence here..."></textarea>
                </div>
                <div class="input-group">
                    <div id="text2" contenteditable="true" class="rich-textarea" data-placeholder="Paste the second long sentence here..."></div>
                </div>

                <div class="button-group">
                    <button id="compare-btn">Compare / Finish Early</button>
                    <button id="reset-btn" class="secondary-btn">Reset Test</button>
                    <button id="save-score-btn" class="secondary-btn" style="display: none; background-color: #27ae60;">Save Score</button>
                    <button id="progress-btn" class="secondary-btn" style="background-color: #8e44ad;">Show Progress</button>
                </div>
                
                <p id="result-text"></p>
            </div>
            
            <div class="stats-section">
                <div id="stats-container">
                    <div class="stats-placeholder">Typing statistics will appear here after the test.</div>
                </div>
            </div>
        </div>
    </div>

    <div id="chart-container" style="display: none;">
        <div class="chart-header">
            <h3>Your Progress</h3>
            <select id="time-filter">
                <option value="all">All Time</option>
                <option value="7">Past 7 Days</option>
                <option value="14">Past 2 Weeks</option>
                <option value="30">Past 1 Month</option>
            </select>
        </div>
        <div id="raw-data-box">
            <h4>Raw Data Log</h4>
            <div id="raw-data-content"></div>
        </div>
        <div id="chart-wrapper">
            <div id="chart-scroll-area">
                <canvas id="progressChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
